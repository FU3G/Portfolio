<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Destination Host Unreachable</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #262624;
      --surface: #1e1e1c;
      --border:  #3e3e3c;
      --text:    #f0efed;
      --text-2:  #a8a8a4;
      --text-3:  #686866;
      --accent:  #ff6928;
      --green:   #22c55e;
      --red:     #ff5f57;
      --dot:     rgba(255,255,255,0.04);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at 1px 1px, var(--dot) 1.5px, transparent 0);
      background-size: 26px 26px;
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
    }

    .grain {
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      pointer-events: none;
      opacity: 0.036;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      background-size: 220px;
      animation: grain 0.2s steps(1) infinite;
      z-index: 0;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-18px,12px); }
      40%  { transform: translate(14px,-8px); }
      60%  { transform: translate(-8px,18px); }
      80%  { transform: translate(18px,-4px); }
      100% { transform: translate(0,0); }
    }

    .terminal {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
      animation: card-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      overflow: hidden;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--border);
    }
    .t-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .t-red    { background: #ff5f57; }
    .t-yellow { background: #febc2e; }
    .t-green  { background: #28c840; }
    .t-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    .terminal-body {
      padding: 20px 24px 28px;
      font-size: 13px;
      line-height: 2;
    }

    .t-line { display: block; opacity: 0; animation: line-in 0.15s ease forwards; }
    @keyframes line-in {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .t-prompt { color: var(--accent); }
    .t-path   { color: var(--green); }
    .t-muted  { color: var(--text-3); }
    .t-error  {
      color: var(--red);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .t-cursor {
      display: inline-block;
      width: 8px; height: 15px;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }

    .t-action {
      opacity: 0;
      animation: line-in 0.3s ease forwards;
      margin-top: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .t-note {
      color: var(--text-2);
      font-size: 12px;
      margin-bottom: 14px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255,105,40,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,105,40,0.5);
    }

    .brand {
      position: relative;
      z-index: 1;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }
    .brand em { font-style: normal; color: var(--accent); }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="terminal">
    <div class="terminal-bar">
      <span class="t-dot t-red"></span>
      <span class="t-dot t-yellow"></span>
      <span class="t-dot t-green"></span>
      <span class="t-title">bash — greg@portfolio</span>
    </div>
    <div class="terminal-body" id="output"></div>
  </div>

  <p class="brand">Greg<em>&lt;/P&gt;</em></p>

  <script>
    const path = window.location.pathname
    const LINES = [
      { cls: "",        html: `<span class="t-prompt">greg@portfolio:~$</span> traceroute <span class="t-path">${path}</span>` },
      { cls: "t-muted", html: "traceroute to unknown host, 30 hops max, 60 byte packets" },
      { cls: "t-muted", html: " 1&nbsp; gateway.local (192.168.1.1) &nbsp;0.421 ms &nbsp;0.388 ms" },
      { cls: "t-muted", html: " 2&nbsp; 10.0.0.1 (10.0.0.1) &nbsp;8.214 ms &nbsp;7.990 ms" },
      { cls: "t-muted", html: " 3&nbsp; * * *" },
      { cls: "t-muted", html: " 4&nbsp; * * * &nbsp;Request timeout for icmp_seq 3" },
      { cls: "t-muted", html: " 5&nbsp; * * * &nbsp;Request timeout for icmp_seq 4" },
      { cls: "t-error", html: "— 404 Destination Host Unreachable —" },
      { cls: "action" },
    ]

    const output = document.getElementById("output")
    let cursor = null

    function showCursor() {
      cursor = document.createElement("span")
      cursor.className = "t-cursor"
      output.appendChild(cursor)
    }

    function removeCursor() {
      if (cursor) { cursor.remove(); cursor = null }
    }

    function appendLine(line, delay) {
      return new Promise(resolve => {
        setTimeout(() => {
          removeCursor()
          if (line.cls === "action") {
            const el = document.createElement("div")
            el.className = "t-action"
            el.style.animationDelay = "0s"
            el.innerHTML = `
              <p class="t-note">Cette route n'existe pas sur ce réseau.</p>
              <a href="/" class="btn-home">cd ~/  —  Retour à l'accueil</a>
            `
            output.appendChild(el)
          } else {
            const el = document.createElement("span")
            el.className = `t-line ${line.cls}`
            el.innerHTML = line.html
            output.appendChild(el)
            output.appendChild(document.createElement("br"))
            showCursor()
          }
          resolve()
        }, delay)
      })
    }

    async function run() {
      showCursor()
      let delay = 300
      for (const line of LINES) {
        await appendLine(line, delay)
        delay = line.cls === "t-error" ? 600 : 380
      }
    }

    run()
  </script>
</body>
</html>
