<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greg&lt;/P&gt; — Bientôt disponible</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #262624;
      --surface: #303030;
      --border:  #3e3e3c;
      --text:    #f0efed;
      --text-2:  #a8a8a4;
      --text-3:  #686866;
      --accent:  #ff6928;
      --green:   #22c55e;
      --dot:     rgba(255,255,255,0.04);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at 1px 1px, var(--dot) 1.5px, transparent 0);
      background-size: 26px 26px;
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain animé */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      pointer-events: none;
      opacity: 0.036;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      background-size: 220px;
      animation: grain 0.2s steps(1) infinite;
      z-index: 0;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-18px,12px); }
      40%  { transform: translate(14px,-8px); }
      60%  { transform: translate(-8px,18px); }
      80%  { transform: translate(18px,-4px); }
      100% { transform: translate(0,0); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 56px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
      animation: card-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Barre orange en haut de la card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-bottom: 32px;
    }
    .brand em { font-style: normal; color: var(--accent); }

    /* Terminal block */
    .terminal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      text-align: left;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .terminal-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot--red    { background: #ff5f57; }
    .dot--yellow { background: #febc2e; }
    .dot--green  { background: #28c840; }

    .line { color: var(--text-3); line-height: 1.8; }
    .line .prompt { color: var(--accent); }
    .line .cmd    { color: var(--text); }
    .line .ok     { color: var(--green); }
    .line .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }

    .title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--text);
      margin-bottom: 12px;
    }
    .title span { color: var(--accent); }

    .subtitle {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.65;
      margin-bottom: 36px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 8px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      color: var(--text-3);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff9a5c);
      border-radius: 999px;
      width: 0%;
      animation: fill-progress 1.8s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 40px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5));
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes fill-progress {
      from { width: 0%; }
      to   { width: 73%; }
    }
    @keyframes shimmer {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .progress-label {
      text-align: right;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      color: var(--accent);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .link:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,105,40,0.07); }

    .eta {
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-3);
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.06em;
    }
    .eta span { color: var(--text-2); }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="card">
    <div class="brand">Greg<em>&lt;/P&gt;</em></div>

    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot dot--red"></div>
        <div class="dot dot--yellow"></div>
        <div class="dot dot--green"></div>
      </div>
      <div class="line"><span class="prompt">~/portfolio</span> $ <span class="cmd">npm run deploy</span></div>
      <div class="line ok">✓ build completed in 0.48s</div>
      <div class="line ok">✓ assets optimized</div>
      <div class="line"><span class="prompt">~/portfolio</span> $ <span class="cmd">polishing UI</span><span class="cursor"></span></div>
    </div>

    <h1 class="title">En cours de <span>construction</span></h1>
    <p class="subtitle">
      Le portfolio est en pleine refonte. Je reviens bientôt avec quelque chose de propre.
    </p>

    <div class="progress-wrap">
      <div class="progress-header">
        <span>Progression</span>
        <span>UI / Polish</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="progress-label">73%</div>
    </div>

    <div class="divider"></div>

    <div class="links">
      <a class="link" href="https://github.com/FU3G" target="_blank" rel="noreferrer">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

      <a class="link" href="mailto:thewolfuego@gmail.com">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/></svg>

    </div>

    <p class="eta">ETA — <span>Très bientôt™</span></p>
  </div>
</body>
</html>
